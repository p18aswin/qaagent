<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QAAgent Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    :root {
      --deep-blue: #065A82;
      --teal: #1C7293;
      --midnight: #21295C;
      --bg: #0f172a;
      --bg-card: #1e293b;
      --bg-card-hover: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #334155;
      --accent: #38bdf8;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --orange: #f97316;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, var(--midnight), var(--deep-blue), var(--teal));
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .header h1 span { color: var(--accent); }
    .header-status {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-muted);
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-muted);
    }
    .status-dot.running { background: var(--green); animation: pulse 1.5s infinite; }
    .status-dot.error { background: var(--red); }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Tabs ── */
    .tabs {
      display: flex; background: var(--bg-card); border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .tab {
      padding: 12px 20px; font-size: 13px; font-weight: 500;
      color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Content ── */
    .content { padding: 24px; max-width: 1440px; margin: 0 auto; }

    /* ── Cards ── */
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; padding: 20px; margin-bottom: 16px;
    }
    .card-title {
      font-size: 14px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;
    }

    /* ── Grid ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }

    /* ── Stat cards ── */
    .stat { text-align: center; padding: 16px; }
    .stat-value { font-size: 32px; font-weight: 700; }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* ── Buttons ── */
    .btn {
      padding: 10px 20px; border-radius: 6px; font-size: 13px; font-weight: 600;
      border: none; cursor: pointer; transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: var(--accent); color: var(--midnight); }
    .btn-primary:hover { background: #7dd3fc; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger { background: var(--red); color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-secondary { background: var(--bg-card-hover); color: var(--text); }
    .btn-secondary:hover { background: #475569; }

    /* ── Forms ── */
    .form-group { margin-bottom: 12px; }
    .form-label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
    .form-input, .form-textarea, .form-select {
      width: 100%; padding: 8px 12px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-size: 13px; font-family: inherit;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      outline: none; border-color: var(--accent);
    }
    .form-textarea { resize: vertical; min-height: 80px; font-family: 'Consolas', monospace; }

    /* ── Timeline ── */
    .timeline { display: flex; flex-direction: column; gap: 2px; max-height: 600px; overflow-y: auto; }
    .timeline-entry {
      display: grid; grid-template-columns: 60px 80px 1fr; gap: 8px;
      padding: 6px 10px; font-size: 12px; font-family: 'Consolas', monospace;
      border-radius: 4px; line-height: 1.6;
    }
    .timeline-entry .time { color: var(--text-muted); }
    .timeline-entry .badge {
      font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 3px;
      text-align: center; white-space: nowrap;
    }
    .timeline-entry.ACTION { background: rgba(56, 189, 248, 0.08); }
    .timeline-entry.ACTION .badge { background: var(--accent); color: var(--midnight); }
    .timeline-entry.PERCEPTION { background: rgba(148, 163, 184, 0.06); }
    .timeline-entry.PERCEPTION .badge { background: var(--text-muted); color: var(--bg); }
    .timeline-entry.REASONING { background: rgba(234, 179, 8, 0.08); }
    .timeline-entry.REASONING .badge { background: var(--yellow); color: var(--bg); }
    .timeline-entry.FINDING { background: rgba(239, 68, 68, 0.1); }
    .timeline-entry.FINDING .badge { background: var(--red); color: white; }
    .timeline-entry.ERROR { background: rgba(239, 68, 68, 0.06); }
    .timeline-entry.ERROR .badge { background: var(--orange); color: white; }
    .timeline-entry.INFO { background: rgba(34, 197, 94, 0.06); }
    .timeline-entry.INFO .badge { background: var(--green); color: white; }
    .timeline-details { color: var(--text); word-break: break-word; }

    /* ── Findings Table ── */
    .findings-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .findings-table th {
      background: var(--midnight); color: var(--text); padding: 10px 12px;
      text-align: left; font-weight: 600; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .findings-table td {
      padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top;
    }
    .findings-table tr:hover { background: rgba(56, 189, 248, 0.04); }

    .severity-badge {
      padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase;
    }
    .severity-critical { background: var(--red); color: white; }
    .severity-high { background: var(--orange); color: white; }
    .severity-medium { background: var(--accent); color: var(--midnight); }
    .severity-low { background: var(--green); color: white; }

    /* ── Session History ── */
    .session-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
      padding: 16px; cursor: pointer; transition: all 0.2s;
    }
    .session-card:hover { border-color: var(--accent); background: var(--bg-card-hover); }
    .session-card h3 { font-size: 14px; margin-bottom: 8px; }
    .session-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 16px; }

    /* ── Progress bar ── */
    .progress-bar { width: 100%; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; border-radius: 3px; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 60px; color: var(--text-muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; max-width: 400px; margin: 0 auto; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ── Config display ── */
    .config-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .config-row:last-child { border-bottom: none; }
    .config-key { color: var(--text-muted); font-size: 13px; }
    .config-val { color: var(--text); font-size: 13px; font-weight: 500; }

    /* ── Finding detail panel ── */
    .finding-detail {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 20px; margin-top: 12px;
    }
    .finding-detail h3 { font-size: 16px; margin-bottom: 12px; }
    .finding-field { margin-bottom: 10px; }
    .finding-field-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 2px; }
    .finding-field-value { font-size: 13px; line-height: 1.5; }

    /* ── Live indicators ── */
    .live-badge {
      background: var(--red); color: white; font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 3px; animation: pulse 1.5s infinite;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── WebSocket Hook ──
    function useWebSocket(url) {
      const [messages, setMessages] = useState([]);
      const [connected, setConnected] = useState(false);
      const wsRef = useRef(null);
      const reconnectRef = useRef(null);

      const connect = useCallback(() => {
        const ws = new WebSocket(url);
        wsRef.current = ws;

        ws.onopen = () => setConnected(true);
        ws.onclose = () => {
          setConnected(false);
          reconnectRef.current = setTimeout(connect, 2000);
        };
        ws.onmessage = (e) => {
          try {
            const data = JSON.parse(e.data);
            setMessages((prev) => [...prev, data]);
          } catch {}
        };
      }, [url]);

      useEffect(() => {
        connect();
        return () => {
          wsRef.current?.close();
          clearTimeout(reconnectRef.current);
        };
      }, [connect]);

      return { messages, connected, clear: () => setMessages([]) };
    }

    // ── App ──
    function App() {
      const [tab, setTab] = useState("explore");
      const [config, setConfig] = useState(null);
      const [running, setRunning] = useState(false);
      const [session, setSession] = useState(null);
      const [timeline, setTimeline] = useState([]);
      const [findings, setFindings] = useState([]);
      const [screenshots, setScreenshots] = useState([]);
      const [sessions, setSessions] = useState([]);
      const [selectedFinding, setSelectedFinding] = useState(null);
      const [viewingSession, setViewingSession] = useState(null);

      const timelineRef = useRef(null);
      const wsUrl = `ws://${window.location.host}`;
      const { messages, connected, clear } = useWebSocket(wsUrl);

      // Fetch initial config
      useEffect(() => {
        fetch("/api/config").then((r) => r.json()).then(setConfig).catch(console.error);
        fetch("/api/sessions").then((r) => r.json()).then(setSessions).catch(console.error);
      }, []);

      // Process WebSocket messages
      useEffect(() => {
        if (messages.length === 0) return;
        const latest = messages[messages.length - 1];

        switch (latest.type) {
          case "status":
            setRunning(latest.running);
            if (latest.session) setSession(latest.session);
            break;
          case "session_start":
            setRunning(true);
            setSession(latest.session);
            setTimeline([]);
            setFindings([]);
            setScreenshots([]);
            setTab("monitor");
            break;
          case "entry":
            setTimeline((prev) => [...prev, latest.entry]);
            if (latest.entry.type === "FINDING") {
              setFindings((prev) => [...prev, latest.entry]);
            }
            if (session) {
              setSession((s) => s ? ({
                ...s,
                actionCount: latest.entry.type === "ACTION" ? (s.actionCount || 0) + 1 : s.actionCount,
                findingsCount: latest.entry.type === "FINDING" ? (s.findingsCount || 0) + 1 : s.findingsCount,
              }) : s);
            }
            break;
          case "screenshot":
            setScreenshots((prev) => [...prev, { filename: latest.filename, sessionId: latest.sessionId }]);
            break;
          case "log":
            setTimeline((prev) => [...prev, latest.entry]);
            break;
          case "session_complete":
            setRunning(false);
            setSession(latest.session);
            fetch("/api/sessions").then((r) => r.json()).then(setSessions).catch(console.error);
            break;
          case "session_stopping":
            break;
          case "session_error":
            setRunning(false);
            setTimeline((prev) => [...prev, { type: "ERROR", message: latest.error, elapsed_ms: 0 }]);
            break;
        }
      }, [messages]);

      // Auto-scroll timeline
      useEffect(() => {
        if (timelineRef.current) {
          timelineRef.current.scrollTop = timelineRef.current.scrollHeight;
        }
      }, [timeline]);

      // Start exploration
      async function startExploration(opts = {}) {
        try {
          const res = await fetch("/api/explore", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              profileRole: opts.profileRole || config?.target?.profiles?.[0]?.role,
              maxActions: opts.maxActions || config?.target?.exploration?.max_actions || 50,
            }),
          });
          const data = await res.json();
          if (!res.ok) alert(data.error || "Failed to start");
        } catch (e) {
          alert("Failed to start exploration: " + e.message);
        }
      }

      // Stop exploration
      async function stopExploration() {
        await fetch("/api/stop", { method: "POST" });
      }

      // Load past session
      async function loadSession(id) {
        const res = await fetch(`/api/sessions/${id}`);
        const data = await res.json();
        setViewingSession(data);
        setTimeline(data.entries || []);
        setFindings(data.findings || []);
        setTab("monitor");
      }

      return (
        <div>
          <header className="header">
            <h1><span>QA</span>Agent Dashboard</h1>
            <div className="header-status">
              <div className={`status-dot ${running ? "running" : connected ? "" : "error"}`} />
              {running ? (
                <span><span className="live-badge">LIVE</span> Exploring...</span>
              ) : connected ? "Connected" : "Disconnected"}
            </div>
          </header>

          <div className="tabs">
            <div className={`tab ${tab === "explore" ? "active" : ""}`} onClick={() => setTab("explore")}>
              Configure & Run
            </div>
            <div className={`tab ${tab === "monitor" ? "active" : ""}`} onClick={() => setTab("monitor")}>
              Live Monitor {running && <span className="live-badge" style={{marginLeft: 6}}>LIVE</span>}
            </div>
            <div className={`tab ${tab === "findings" ? "active" : ""}`} onClick={() => setTab("findings")}>
              Findings {findings.length > 0 && `(${findings.length})`}
            </div>
            <div className={`tab ${tab === "history" ? "active" : ""}`} onClick={() => setTab("history")}>
              History
            </div>
          </div>

          <div className="content">
            {tab === "explore" && <ExploreTab config={config} running={running} session={session} onStart={startExploration} onStop={stopExploration} />}
            {tab === "monitor" && <MonitorTab timeline={timeline} session={session} running={running} findings={findings} screenshots={screenshots} timelineRef={timelineRef} />}
            {tab === "findings" && <FindingsTab findings={findings} session={session} selectedFinding={selectedFinding} onSelect={setSelectedFinding} timeline={timeline} />}
            {tab === "history" && <HistoryTab sessions={sessions} onLoad={loadSession} />}
          </div>
        </div>
      );
    }

    // ── Explore Tab ──
    function ExploreTab({ config, running, session, onStart, onStop }) {
      const [maxActions, setMaxActions] = useState(50);
      const [selectedProfile, setSelectedProfile] = useState("");

      useEffect(() => {
        if (config?.target?.profiles?.[0]) setSelectedProfile(config.target.profiles[0].role);
        if (config?.target?.exploration?.max_actions) setMaxActions(config.target.exploration.max_actions);
      }, [config]);

      return (
        <div>
          {/* Stats */}
          <div className="grid-4" style={{ marginBottom: 20 }}>
            <div className="card stat">
              <div className="stat-value" style={{ color: "var(--accent)" }}>{config?.target?.app_url ? "1" : "0"}</div>
              <div className="stat-label">Target App</div>
            </div>
            <div className="card stat">
              <div className="stat-value" style={{ color: "var(--green)" }}>{config?.target?.profiles?.length || 0}</div>
              <div className="stat-label">Test Profiles</div>
            </div>
            <div className="card stat">
              <div className="stat-value" style={{ color: "var(--yellow)" }}>{config?.stories?.stories?.length || 0}</div>
              <div className="stat-label">Sprint Stories</div>
            </div>
            <div className="card stat">
              <div className="stat-value" style={{ color: "var(--text-muted)" }}>{config?.api?.model || "N/A"}</div>
              <div className="stat-label" style={{ fontSize: 10 }}>LLM Model</div>
            </div>
          </div>

          <div className="grid-2">
            {/* Target Config */}
            <div className="card">
              <div className="card-title">Target Application</div>
              <div className="config-row">
                <span className="config-key">URL</span>
                <span className="config-val">{config?.target?.app_url || "Not configured"}</span>
              </div>
              <div className="config-row">
                <span className="config-key">API Key</span>
                <span className="config-val">{config?.api?.apiKey || "Not set"}</span>
              </div>
              <div className="config-row">
                <span className="config-key">Strategy</span>
                <span className="config-val">{config?.target?.exploration?.strategy || "breadth"}-first</span>
              </div>
              <div className="config-row">
                <span className="config-key">Screenshot On</span>
                <span className="config-val">{config?.target?.exploration?.screenshot_on?.join(", ") || "transitions"}</span>
              </div>
              <div style={{ marginTop: 16 }}>
                <div className="card-title">Profiles</div>
                {config?.target?.profiles?.map((p, i) => (
                  <div key={i} className="config-row">
                    <span className="config-key">{p.role}</span>
                    <span className="config-val">{p.username} | Scope: {p.scope?.join(", ") || "all"} | Password: {p.hasPassword ? "Set" : "Missing"}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Sprint Stories */}
            <div className="card">
              <div className="card-title">Sprint Context ({config?.stories?.sprint || "No Sprint"})</div>
              {config?.stories?.stories?.map((story, i) => (
                <div key={i} style={{ marginBottom: 12, padding: 10, background: "var(--bg)", borderRadius: 6 }}>
                  <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 4 }}>{story.id}: {story.title}</div>
                  <div style={{ fontSize: 12, color: "var(--text-muted)", marginBottom: 6 }}>{story.description}</div>
                  {story.acceptance_criteria?.map((ac, j) => (
                    <div key={j} style={{ fontSize: 11, color: "var(--text-muted)", paddingLeft: 8 }}>{ac}</div>
                  ))}
                  {story.modules_affected && (
                    <div style={{ fontSize: 11, color: "var(--accent)", marginTop: 4 }}>Modules: {story.modules_affected.join(", ")}</div>
                  )}
                </div>
              ))}
              {(!config?.stories?.stories || config.stories.stories.length === 0) && (
                <div style={{ color: "var(--text-muted)", fontSize: 13 }}>No stories configured. Add them in config/stories.json</div>
              )}
            </div>
          </div>

          {/* Run Controls */}
          <div className="card" style={{ marginTop: 16 }}>
            <div className="card-title">Run Exploration</div>
            <div style={{ display: "flex", gap: 16, alignItems: "flex-end" }}>
              <div className="form-group" style={{ flex: 1 }}>
                <label className="form-label">Profile</label>
                <select className="form-select" value={selectedProfile} onChange={(e) => setSelectedProfile(e.target.value)}>
                  {config?.target?.profiles?.map((p, i) => (
                    <option key={i} value={p.role}>{p.role}</option>
                  ))}
                </select>
              </div>
              <div className="form-group" style={{ width: 120 }}>
                <label className="form-label">Max Actions</label>
                <input className="form-input" type="number" value={maxActions} onChange={(e) => setMaxActions(parseInt(e.target.value) || 50)} min={5} max={200} />
              </div>
              <div className="form-group">
                {running ? (
                  <button className="btn btn-danger" onClick={onStop}>Stop Exploration</button>
                ) : (
                  <button className="btn btn-primary" onClick={() => onStart({ profileRole: selectedProfile, maxActions })}>
                    Start Exploration
                  </button>
                )}
              </div>
            </div>
            {running && session && (
              <div style={{ marginTop: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "var(--text-muted)", marginBottom: 4 }}>
                  <span>Progress: {session.actionCount || 0} / {session.maxActions} actions</span>
                  <span>{session.findingsCount || 0} findings</span>
                </div>
                <div className="progress-bar">
                  <div className="progress-fill" style={{ width: `${((session.actionCount || 0) / session.maxActions) * 100}%` }} />
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── Monitor Tab ──
    function MonitorTab({ timeline, session, running, findings, screenshots, timelineRef }) {
      const [filter, setFilter] = useState("ALL");

      const filteredTimeline = filter === "ALL"
        ? timeline
        : timeline.filter((e) => e.type === filter);

      return (
        <div>
          {/* Live Stats */}
          <div className="grid-4" style={{ marginBottom: 16 }}>
            <div className="card stat">
              <div className="stat-value" style={{ color: "var(--accent)" }}>{timeline.filter(e => e.type === "ACTION").length}</div>
              <div className="stat-label">Actions</div>
            </div>
            <div className="card stat">
              <div className="stat-value" style={{ color: "var(--teal)" }}>
                {new Set(timeline.filter(e => e.type === "PERCEPTION").map(e => e.url)).size}
              </div>
              <div className="stat-label">Pages Visited</div>
            </div>
            <div className="card stat">
              <div className="stat-value" style={{ color: "var(--red)" }}>{findings.length}</div>
              <div className="stat-label">Findings</div>
            </div>
            <div className="card stat">
              <div className="stat-value" style={{ color: "var(--text-muted)" }}>
                {timeline.length > 0 ? `${((timeline[timeline.length-1]?.elapsed_ms || 0) / 1000).toFixed(0)}s` : "0s"}
              </div>
              <div className="stat-label">Duration</div>
            </div>
          </div>

          <div className="grid-2">
            {/* Observability Timeline */}
            <div className="card" style={{ gridColumn: "1 / -1" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <div className="card-title" style={{ margin: 0 }}>
                  Observability Timeline
                  {running && <span className="live-badge" style={{ marginLeft: 8 }}>LIVE</span>}
                </div>
                <div style={{ display: "flex", gap: 4 }}>
                  {["ALL", "ACTION", "PERCEPTION", "REASONING", "FINDING", "ERROR"].map((f) => (
                    <button
                      key={f}
                      className={`btn ${filter === f ? "btn-primary" : "btn-secondary"}`}
                      style={{ padding: "4px 10px", fontSize: 11 }}
                      onClick={() => setFilter(f)}
                    >
                      {f}
                    </button>
                  ))}
                </div>
              </div>

              {filteredTimeline.length === 0 ? (
                <div className="empty-state">
                  <div className="icon">&#128269;</div>
                  <h3>{running ? "Waiting for events..." : "No exploration data"}</h3>
                  <p>{running ? "Events will appear here as the agent explores." : "Start an exploration from the Configure tab to see the live timeline."}</p>
                </div>
              ) : (
                <div className="timeline" ref={timelineRef}>
                  {filteredTimeline.map((entry, i) => (
                    <TimelineEntry key={i} entry={entry} />
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* Latest screenshot */}
          {screenshots.length > 0 && (
            <div className="card" style={{ marginTop: 16 }}>
              <div className="card-title">Latest Screenshot</div>
              <img
                src={`/api/sessions/${screenshots[screenshots.length - 1].sessionId}/screenshots/${screenshots[screenshots.length - 1].filename}`}
                alt="Latest screenshot"
                style={{ maxWidth: "100%", borderRadius: 6, border: "1px solid var(--border)" }}
                onError={(e) => e.target.style.display = "none"}
              />
            </div>
          )}
        </div>
      );
    }

    // ── Timeline Entry ──
    function TimelineEntry({ entry }) {
      const elapsed = entry.elapsed_ms != null ? `${(entry.elapsed_ms / 1000).toFixed(1)}s` : "";

      let details = "";
      switch (entry.type) {
        case "ACTION":
          details = `${entry.action}: ${entry.target || ""}${entry.details ? ` (${entry.details})` : ""}`;
          break;
        case "PERCEPTION":
          details = `${entry.url || ""} | ${entry.elements_count || 0} elements | ${entry.forms_count || 0} forms${entry.errors_detected?.length ? ` | ERRORS: ${entry.errors_detected.join("; ")}` : ""}`;
          break;
        case "REASONING":
          details = entry.thought || "";
          break;
        case "FINDING":
          details = `[${entry.severity}] ${entry.description || ""}`;
          break;
        case "ERROR":
          details = entry.message || "";
          break;
        case "INFO":
          details = entry.message || "";
          break;
        default:
          details = JSON.stringify(entry);
      }

      return (
        <div className={`timeline-entry ${entry.type}`}>
          <span className="time">{elapsed}</span>
          <span className="badge">{entry.type}</span>
          <span className="timeline-details">{details}</span>
        </div>
      );
    }

    // ── Findings Tab ──
    function FindingsTab({ findings, session, selectedFinding, onSelect, timeline }) {
      if (findings.length === 0) {
        return (
          <div className="empty-state">
            <div className="icon">&#9989;</div>
            <h3>No findings yet</h3>
            <p>Findings will appear here as the agent discovers bugs and anomalies during exploration.</p>
          </div>
        );
      }

      // Group by severity
      const severityCounts = { critical: 0, high: 0, medium: 0, low: 0 };
      findings.forEach((f) => severityCounts[f.severity] = (severityCounts[f.severity] || 0) + 1);

      return (
        <div>
          {/* Severity breakdown */}
          <div className="grid-4" style={{ marginBottom: 16 }}>
            <div className="card stat">
              <div className="stat-value" style={{ color: "var(--red)" }}>{severityCounts.critical}</div>
              <div className="stat-label">Critical</div>
            </div>
            <div className="card stat">
              <div className="stat-value" style={{ color: "var(--orange)" }}>{severityCounts.high}</div>
              <div className="stat-label">High</div>
            </div>
            <div className="card stat">
              <div className="stat-value" style={{ color: "var(--accent)" }}>{severityCounts.medium}</div>
              <div className="stat-label">Medium</div>
            </div>
            <div className="card stat">
              <div className="stat-value" style={{ color: "var(--green)" }}>{severityCounts.low}</div>
              <div className="stat-label">Low</div>
            </div>
          </div>

          {/* Findings table */}
          <div className="card" style={{ overflowX: "auto" }}>
            <table className="findings-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Severity</th>
                  <th>Description</th>
                  <th>Expected</th>
                  <th>Actual</th>
                  <th>Confidence</th>
                  <th>URL</th>
                </tr>
              </thead>
              <tbody>
                {findings.map((f, i) => (
                  <tr key={i} onClick={() => onSelect(selectedFinding === i ? null : i)} style={{ cursor: "pointer" }}>
                    <td>EXP-{String(i + 1).padStart(3, "0")}</td>
                    <td><span className={`severity-badge severity-${f.severity}`}>{f.severity}</span></td>
                    <td>{f.description}</td>
                    <td>{f.expected || "-"}</td>
                    <td>{f.actual || "-"}</td>
                    <td>{f.confidence ? `${f.confidence}%` : "-"}</td>
                    <td style={{ maxWidth: 200, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{f.url || "-"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* Finding detail */}
          {selectedFinding !== null && findings[selectedFinding] && (
            <FindingDetail finding={findings[selectedFinding]} index={selectedFinding} timeline={timeline} />
          )}
        </div>
      );
    }

    // ── Finding Detail Panel ──
    function FindingDetail({ finding, index, timeline }) {
      // Find the reasoning entries around this finding
      const findingTime = finding.elapsed_ms;
      const contextEntries = timeline.filter((e) =>
        e.elapsed_ms != null &&
        Math.abs(e.elapsed_ms - findingTime) < 15000 &&
        (e.type === "REASONING" || e.type === "PERCEPTION" || e.type === "ACTION")
      ).slice(-8);

      return (
        <div className="finding-detail">
          <h3 style={{ color: "var(--accent)" }}>EXP-{String(index + 1).padStart(3, "0")} Detail</h3>

          <div className="grid-2" style={{ marginTop: 12 }}>
            <div>
              <div className="finding-field">
                <div className="finding-field-label">Description</div>
                <div className="finding-field-value">{finding.description}</div>
              </div>
              <div className="finding-field">
                <div className="finding-field-label">Expected Behavior</div>
                <div className="finding-field-value">{finding.expected || "Not specified"}</div>
              </div>
              <div className="finding-field">
                <div className="finding-field-label">Actual Behavior</div>
                <div className="finding-field-value">{finding.actual || "Not specified"}</div>
              </div>
              <div className="finding-field">
                <div className="finding-field-label">Story Reference</div>
                <div className="finding-field-value">{finding.story_ref || "None matched"}</div>
              </div>
            </div>

            <div>
              <div className="card-title">Agent Context at Discovery</div>
              <div className="timeline" style={{ maxHeight: 300 }}>
                {contextEntries.length > 0 ? contextEntries.map((e, i) => (
                  <TimelineEntry key={i} entry={e} />
                )) : (
                  <div style={{ color: "var(--text-muted)", fontSize: 12, padding: 12 }}>No context entries available</div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── History Tab ──
    function HistoryTab({ sessions, onLoad }) {
      if (sessions.length === 0) {
        return (
          <div className="empty-state">
            <div className="icon">&#128218;</div>
            <h3>No past sessions</h3>
            <p>Completed exploration sessions will appear here. Run your first exploration to get started.</p>
          </div>
        );
      }

      return (
        <div>
          <div className="card-title" style={{ marginBottom: 16 }}>Past Sessions</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {sessions.map((s) => (
              <div key={s.id} className="session-card" onClick={() => onLoad(s.id)}>
                <h3>{s.id.replace("session_", "").replace(/_/g, " ")}</h3>
                <div className="session-meta">
                  <span>Actions: {s.actions}</span>
                  <span>Findings: {s.findings}</span>
                  <span>Entries: {s.entries}</span>
                  <span>{s.hasReport ? "Report available" : "No report"}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── Mount ──
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
